services:
  dashboard:
    build: ./dashboard
    container_name: security-lab-dashboard
    ports:
      - "7777:7777"
    volumes:
      # live-reload без пересборки образа
      - ./dashboard/app.py:/app/app.py:ro
      - ./dashboard/static:/app/static:ro
      - ./reports:/reports:ro
      - ./.claude/skills:/skills:ro
    environment:
      - LAB_REPORTS=/reports
      - LAB_SKILLS=/skills
    restart: unless-stopped
